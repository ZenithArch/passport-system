<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำร้องหนังสือเดินทางและวีซ่าออนไลน์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Sarabun', sans-serif; } 
        /* เพิ่มลูกเล่นพื้นหลังให้ดูมีมิติและทันสมัย */
        .bg-pattern {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-pattern min-h-screen py-10 px-4 flex items-center justify-center">
    <div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-4xl border-t-8 border-slate-800">
        
        <div class="text-center mb-10">
            <img src="https://cdn-icons-png.flaticon.com/512/8074/8074804.png" alt="Logo" class="w-24 h-24 mx-auto mb-4 opacity-90">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">ระบบคำร้องหนังสือเดินทางและวีซ่า</h1>
            <p class="text-slate-500 text-lg">สำหรับบุคลากรและนิสิต</p>
        </div>
        
        <form id="myForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                <div>
                    <label class="block text-slate-700 font-semibold mb-2 text-sm uppercase tracking-wide">ชื่อ-นามสกุล</label>
                    <input type="text" id="name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-slate-800 outline-none transition-all duration-300">
                </div>
                <div>
                    <label class="block text-slate-700 font-semibold mb-2 text-sm uppercase tracking-wide">รหัสนิสิต / รหัสบุคลากร</label>
                    <input type="text" id="studentId" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-slate-800 outline-none transition-all duration-300">
                </div>
                <div>
                    <label class="block text-slate-700 font-semibold mb-2 text-sm uppercase tracking-wide">สัญชาติ</label>
                    <input type="text" id="nationality" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-slate-800 outline-none transition-all duration-300">
                </div>
                <div>
                    <label class="block text-slate-700 font-semibold mb-2 text-sm uppercase tracking-wide">หนังสือเดินทางเลขที่</label>
                    <input type="text" id="passportNo" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-slate-800 outline-none transition-all duration-300">
                </div>
                
                <div>
                    <label class="block text-slate-700 font-semibold mb-2 text-sm uppercase tracking-wide">คณะ / สังกัด</label>
                    <select id="faculty" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-slate-800 outline-none transition-all duration-300">
                        <option value="" disabled selected>กรุณาเลือกคณะ...</option>
                        <option value="คณะศิลปกรรมศาสตร์และวัฒนธรรมศาสตร์">คณะศิลปกรรมศาสตร์และวัฒนธรรมศาสตร์</option>
                        <option value="คณะอื่นๆ">คณะอื่นๆ</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-700 font-semibold mb-2 text-sm uppercase tracking-wide">หลักสูตร</label>
                    <input type="text" id="program" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-slate-800 outline-none transition-all duration-300">
                </div>

                <div>
                    <label class="block text-slate-700 font-semibold mb-2 text-sm uppercase tracking-wide">เบอร์โทรศัพท์มือถือ</label>
                    <input type="tel" id="phone" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-slate-800 outline-none transition-all duration-300">
                </div>
                <div>
                    <label class="block text-slate-700 font-semibold mb-2 text-sm uppercase tracking-wide">อีเมล หรือ WeChat ID</label>
                    <input type="text" id="contactId" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-slate-800 outline-none transition-all duration-300">
                </div>
            </div>

            <hr class="border-slate-200 my-8">

            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    ข้อมูลเกี่ยวกับวีซ่า (กรอกเฉพาะที่ต้องการดำเนินการ)
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-slate-600 font-medium mb-2 text-sm">ต่ออายุ: วีซ่าจะหมดอายุวันที่</label>
                        <input type="date" id="visaExpiry" class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 outline-none transition-all duration-300">
                    </div>
                    <div>
                        <label class="block text-slate-600 font-medium mb-2 text-sm">ยกเลิก: ประสงค์ยกเลิกวีซ่าในวันที่</label>
                        <input type="date" id="visaCancel" class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 outline-none transition-all duration-300">
                    </div>
                </div>
            </div>

            <div class="mt-8">
                <label class="block text-slate-700 font-semibold mb-3 text-sm uppercase tracking-wide">แนบเอกสาร (รูปถ่าย หรือ PDF)</label>
                <div class="flex items-center justify-center w-full">
                    <label for="file" class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-2xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 mb-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            <p class="mb-2 text-sm text-slate-500"><span class="font-semibold">คลิกเพื่ออัปโหลด</span> หรือลากไฟล์มาวาง</p>
                        </div>
                        <input id="file" type="file" required class="hidden" />
                    </label>
                </div>
                <p id="fileNameDisplay" class="mt-2 text-sm text-center text-slate-600 font-medium"></p>
            </div>
            
            <button type="submit" id="btn" class="w-full bg-slate-800 text-white text-lg font-bold py-4 px-4 rounded-xl hover:bg-slate-900 transition-all duration-300 shadow-lg hover:shadow-xl mt-8">
                ส่งคำร้อง
            </button>
        </form>
        
        <div id="msg" class="mt-6 text-center text-lg hidden p-4 rounded-xl"></div>
    </div>

    <script>
        // === ลบข้อความนี้และใส่ Web App URL ของคุณในเครื่องหมาย ' ' ===
        const GAS_URL = '1m8_5ilRXXt86bE2UulcUoa7bdH-YUzOK';

        // แสดงชื่อไฟล์เมื่อมีการเลือกไฟล์
        document.getElementById('file').addEventListener('change', function(e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : '';
            document.getElementById('fileNameDisplay').textContent = fileName ? 'ไฟล์ที่เลือก: ' + fileName : '';
        });

        document.getElementById('myForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            
            btn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังประมวลผล...'; 
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            msg.classList.add('hidden');

            const file = document.getElementById('file').files[0];
            const reader = new FileReader();
            
            reader.onload = async function() {
                const base64 = reader.result.split(',')[1];
                
                const payload = {
                    name: document.getElementById('name').value,
                    studentId: document.getElementById('studentId').value,
                    nationality: document.getElementById('nationality').value,
                    passportNo: document.getElementById('passportNo').value,
                    faculty: document.getElementById('faculty').value,
                    program: document.getElementById('program').value,
                    phone: document.getElementById('phone').value,
                    contactId: document.getElementById('contactId').value,
                    visaExpiry: document.getElementById('visaExpiry').value,
                    visaCancel: document.getElementById('visaCancel').value,
                    fileData: base64,
                    fileName: file.name,
                    mimeType: file.type
                };

                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    
                    if(result.status === 'success') {
                        msg.innerHTML = '<b>✅ ดำเนินการสำเร็จ</b><br>ข้อมูลและเอกสารของคุณถูกจัดส่งเรียบร้อยแล้ว';
                        msg.className = 'mt-6 text-center text-emerald-800 bg-emerald-100 p-4 rounded-xl block border border-emerald-200';
                        document.getElementById('myForm').reset();
                        document.getElementById('fileNameDisplay').textContent = '';
                    }
                } catch (error) {
                    msg.innerHTML = '<b>❌ เกิดข้อผิดพลาด</b><br>ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่อีกครั้ง';
                    msg.className = 'mt-6 text-center text-red-800 bg-red-100 p-4 rounded-xl block border border-red-200';
                }
                
                btn.innerHTML = 'ส่งคำร้อง'; 
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            };
            
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
